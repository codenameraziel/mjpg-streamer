version: "3.8"

services:
  mjpg-streamer:
    image: jacksonliam/mjpg-streamer:latest
    container_name: mjpg-streamer
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/video0:/dev/video0
      - /dev/video1:/dev/video1
    command: >
      mjpg_streamer
      -i "input_uvc.so -y -n -r 1920x1080 -f 30 -d /dev/video0"
      -o "output_http.so -w /opt/mjpg-streamer/mjpg-streamer-experimental/www -p 8080"
    ports:
      - "8080:8080"
